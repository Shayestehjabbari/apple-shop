<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders — iPhone Zambia</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="/" class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
        iPhone Zambia
      </a>
      <nav class="header-nav">
        <a href="/" class="header-link">Shop</a>
        <a href="/orders.html" class="header-link active">My Orders</a>
      </nav>
    </div>
  </header>

  <main class="orders-page sf-fade-in">
    <article class="orders-card">
      <div class="sf-page-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </div>
      <h1>My Orders</h1>
      <p class="orders-subtitle">Enter your phone number to view your order history.</p>
      <form id="orders-form" class="orders-form" role="group">
        <input type="tel" id="order-phone" placeholder="e.g. 0971234567" required>
        <button type="submit">Look Up Orders</button>
      </form>
      <div id="orders-list"></div>
    </article>
  </main>

  <script>
    function esc(str) {
      const el = document.createElement('span');
      el.textContent = str;
      return el.innerHTML;
    }

    document.getElementById('orders-form').onsubmit = async (e) => {
      e.preventDefault();
      const phone = document.getElementById('order-phone').value.trim();
      if (!phone) return;

      const container = document.getElementById('orders-list');
      container.innerHTML = '<p class="empty">Loading...</p>';

      const res = await fetch(`/api/orders?phone=${encodeURIComponent(phone)}`);
      const { data } = await res.json();

      if (!data || data.length === 0) {
        container.innerHTML = '<p class="empty">No orders found for this phone number.</p>';
        return;
      }

      let html = '';
      for (const order of data) {
        const date = new Date(order.createdAt).toLocaleString();
        html += `
          <div class="order-item">
            <div class="order-item-image">
              <img src="${esc(order.productImage || '')}" alt="${esc(order.productName || '')}" onerror="this.style.display='none'">
            </div>
            <div class="order-item-info">
              <strong>${esc(order.productName || 'Deleted product')}</strong>
              <span class="order-date">${esc(date)}</span>
              <span class="order-amount">ZMW ${Number(order.amount).toLocaleString()}</span>
            </div>
            <div class="order-item-status">
              <span class="status-badge status-${esc(order.status)}">${esc(order.status)}</span>
              <a href="/return.html?depositId=${esc(order.depositId)}" class="order-detail-link">View Details</a>
            </div>
          </div>
        `;
      }

      container.innerHTML = html;
    };
  </script>

  <footer class="sf-footer">
    <div class="sf-footer-inner">
      <span class="sf-footer-copy">&copy; 2026 iPhone Zambia</span>
      <div class="sf-footer-links">
        <a href="/">Shop</a>
        <a href="/orders.html">My Orders</a>
      </div>
    </div>
  </footer>
</body>
</html>
