<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iPhone Zambia</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="/" class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
        iPhone Zambia
      </a>
      <nav class="header-nav">
        <a href="/" class="header-link">Shop</a>
        <a href="/orders.html" class="header-link">My Orders</a>
      </nav>
    </div>
  </header>

  <div class="sf-breadcrumb" id="breadcrumb">
    <a href="/">Shop</a><span>&rsaquo;</span><span id="breadcrumb-name">Product</span>
  </div>

  <main id="product-detail" class="product-detail sf-fade-in">
    <p>Loading...</p>
  </main>

  <script>
    function esc(str) {
      const el = document.createElement('span');
      el.textContent = str;
      return el.innerHTML;
    }

    async function loadProduct() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) {
        document.getElementById('product-detail').innerHTML = '<p>Product not found.</p>';
        return;
      }

      const res = await fetch(`/api/products/${id}`);
      const { success, data: product, error } = await res.json();

      if (!success) {
        document.getElementById('product-detail').innerHTML = `<p>${esc(error)}</p>`;
        return;
      }

      document.title = `${product.name} — iPhone Zambia`;

      const stockClass = product.stock > 0 ? 'stock-available' : 'stock-out';
      const stockText = product.stock > 0 ? `${product.stock} in stock` : 'Out of Stock';
      const btnDisabled = product.stock <= 0 ? 'disabled' : '';

      // Build gallery thumbnails
      const images = product.images || [];
      let galleryHtml = '';
      if (images.length > 0) {
        const thumbs = images.map(img =>
          `<img src="${esc(img.imagePath)}" alt="Gallery" class="gallery-thumb" onclick="setMainImage(this.src)" onerror="this.style.display='none'">`
        ).join('');
        galleryHtml = `
          <div class="gallery-strip">
            <img src="${esc(product.image)}" alt="${esc(product.name)}" class="gallery-thumb active" onclick="setMainImage(this.src)">
            ${thumbs}
          </div>
        `;
      }

      document.getElementById('breadcrumb-name').textContent = product.name;

      document.getElementById('product-detail').innerHTML = `
        <div class="detail-card">
          <div class="detail-images">
            <img id="main-image" src="${esc(product.image)}" alt="${esc(product.name)}" onerror="this.style.display='none'">
            ${galleryHtml}
          </div>
          <div class="detail-info">
            <h1>${esc(product.name)}</h1>
            <p class="detail-desc">${esc(product.description)}</p>
            <div class="detail-price">ZMW ${Number(product.price).toLocaleString()}</div>
            <span class="stock-badge ${stockClass}">${stockText}</span>
            <button id="buy-btn" class="buy-btn" ${btnDisabled}>${product.stock > 0 ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg> Buy Now' : 'Out of Stock'}</button>
          </div>
        </div>
      `;

      if (product.stock > 0) {
        document.getElementById('buy-btn').onclick = () => {
          window.location.href = `/checkout.html?id=${product.id}`;
        };
      }
    }

    function setMainImage(src) {
      document.getElementById('main-image').src = src;
      document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
      const clicked = [...document.querySelectorAll('.gallery-thumb')].find(t => t.src === src);
      if (clicked) clicked.classList.add('active');
    }

    loadProduct();
  </script>

  <footer class="sf-footer">
    <div class="sf-footer-inner">
      <span class="sf-footer-copy">&copy; 2026 iPhone Zambia</span>
      <div class="sf-footer-links">
        <a href="/">Shop</a>
        <a href="/orders.html">My Orders</a>
      </div>
    </div>
  </footer>
</body>
</html>
