<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment — iPhone Zambia</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="/" class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
        iPhone Zambia
      </a>
      <nav class="header-nav">
        <a href="/" class="header-link">Shop</a>
        <a href="/orders.html" class="header-link">My Orders</a>
      </nav>
    </div>
  </header>

  <main class="return-page sf-fade-in">
    <article class="return-card" id="return-card">
      <h1>Thank you for your purchase!</h1>
      <p>Your payment is being processed.</p>
      <button role="button" id="check-status-btn" onclick="checkStatus()">Check Payment Status</button>
      <div style="margin-top: 16px;">
        <a href="/" class="back-link">Back to Shop</a>
      </div>
    </article>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const depositId = params.get('depositId');

    async function checkStatus() {
      if (!depositId) {
        showResult('unknown');
        return;
      }

      const btn = document.getElementById('check-status-btn');
      btn.textContent = 'Checking...';
      btn.disabled = true;

      try {
        const res = await fetch(`/api/payments/${depositId}/status`, { cache: 'no-store' });
        const data = await res.json();

        if (res.ok) {
          showResult(data.status, data.failReason);
        } else {
          showResult('pending');
        }
      } catch {
        showResult('pending');
      }
    }

    function esc(str) {
      const el = document.createElement('span');
      el.textContent = str;
      return el.innerHTML;
    }

    function showResult(status, failReason) {
      const card = document.getElementById('return-card');

      if (status === 'completed') {
        card.innerHTML = `
          <div class="status-icon status-icon-success">&#10003;</div>
          <h1 class="status-icon-success">Purchase Completed!</h1>
          <p>Your payment has been received successfully. Thank you for shopping with us!</p>
          <a href="/" role="button">Back to Shop</a>
        `;
      } else if (status === 'failed') {
        card.innerHTML = `
          <div class="status-icon status-icon-failed">&#10007;</div>
          <h1 class="status-icon-failed">Payment Failed</h1>
          <p>Unfortunately your payment could not be processed. Please try again or contact support.</p>
          ${failReason ? `<p style="color:#e91e63;font-size:14px;margin-top:8px;">Reason: ${esc(failReason)}</p>` : ''}
          <a href="/" role="button">Back to Shop</a>
        `;
      } else {
        card.innerHTML = `
          <div class="status-icon status-icon-pending">&#8987;</div>
          <h1 class="status-icon-pending">Payment Pending</h1>
          <p>Your payment is still being processed. Please check back in a few moments.</p>
          <button role="button" onclick="checkStatus()">Check Again</button>
          <div style="margin-top: 16px;">
            <a href="/" class="back-link">Back to Shop</a>
          </div>
        `;
      }
    }
  </script>

  <footer class="sf-footer">
    <div class="sf-footer-inner">
      <span class="sf-footer-copy">&copy; 2026 iPhone Zambia</span>
      <div class="sf-footer-links">
        <a href="/">Shop</a>
        <a href="/orders.html">My Orders</a>
      </div>
    </div>
  </footer>
</body>
</html>
