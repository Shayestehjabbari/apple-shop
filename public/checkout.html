<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — iPhone Zambia</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="/" class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
        iPhone Zambia
      </a>
      <nav class="header-nav">
        <a href="/" class="header-link">Shop</a>
        <a href="/orders.html" class="header-link">My Orders</a>
      </nav>
    </div>
  </header>

  <main class="checkout-page sf-fade-in">
    <div id="checkout-content">
      <p>Loading...</p>
    </div>
  </main>

  <script>
    function esc(str) {
      const el = document.createElement('span');
      el.textContent = str;
      return el.innerHTML;
    }

    async function loadCheckout() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) {
        document.getElementById('checkout-content').innerHTML = '<p>Product not found.</p>';
        return;
      }

      const res = await fetch(`/api/products/${id}`);
      const { success, data: product, error } = await res.json();

      if (!success) {
        document.getElementById('checkout-content').innerHTML = `<p>${esc(error)}</p>`;
        return;
      }

      document.title = `Checkout: ${product.name} — iPhone Zambia`;

      document.getElementById('checkout-content').innerHTML = `
        <div class="checkout-card">
          <div class="checkout-summary">
            <img src="${esc(product.image)}" alt="${esc(product.name)}" onerror="this.style.display='none'">
            <div>
              <h2>${esc(product.name)}</h2>
              <div class="checkout-price">ZMW ${Number(product.price).toLocaleString()}</div>
            </div>
          </div>

          <div class="trust-badges">
            <div class="trust-badge">
              <div class="sf-trust-icon sf-trust-icon--green">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </div>
              <span>Secure Payment</span>
            </div>
            <div class="trust-badge">
              <div class="sf-trust-icon sf-trust-icon--blue">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
              </div>
              <span>Mobile Money</span>
            </div>
            <div class="trust-badge">
              <div class="sf-trust-icon sf-trust-icon--purple">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
              </div>
              <span>Buyer Protection</span>
            </div>
          </div>

          <form id="checkout-form">
            <h3>Your Details</h3>
            <label>
              Full Name
              <input type="text" id="c-name" required placeholder="John Banda">
            </label>
            <label>
              Phone Number
              <input type="tel" id="c-phone" required placeholder="0971234567">
            </label>
            <label>
              Email Address
              <input type="email" id="c-email" required placeholder="john@example.com">
            </label>
            <label>
              Address
              <input type="text" id="c-address" required placeholder="123 Cairo Road">
            </label>
            <label>
              City
              <input type="text" id="c-city" required placeholder="Lusaka">
            </label>
            <button type="submit" id="pay-btn" class="buy-btn">Proceed to Payment</button>
          </form>
        </div>
      `;

      document.getElementById('checkout-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('pay-btn');
        btn.disabled = true;
        btn.textContent = 'Processing...';

        const customer = {
          name: document.getElementById('c-name').value.trim(),
          phone: document.getElementById('c-phone').value.trim(),
          email: document.getElementById('c-email').value.trim(),
          address: document.getElementById('c-address').value.trim(),
          city: document.getElementById('c-city').value.trim(),
        };

        try {
          const payRes = await fetch('/api/pay', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ productId: product.id, customer }),
          });
          const payData = await payRes.json();

          if (payData.success && payData.redirectUrl) {
            window.location.href = payData.redirectUrl;
          } else {
            alert(payData.error || 'Payment failed. Please try again.');
            btn.disabled = false;
            btn.textContent = 'Proceed to Payment';
          }
        } catch {
          alert('Could not connect to payment service. Please try again.');
          btn.disabled = false;
          btn.textContent = 'Proceed to Payment';
        }
      };
    }

    loadCheckout();
  </script>

  <footer class="sf-footer">
    <div class="sf-footer-inner">
      <span class="sf-footer-copy">&copy; 2026 iPhone Zambia</span>
      <div class="sf-footer-links">
        <a href="/">Shop</a>
        <a href="/orders.html">My Orders</a>
      </div>
    </div>
  </footer>
</body>
</html>
